<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100vh;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#0D0D0D;color:#fff;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}

/* Background */
.bg-image{position:fixed;inset:-60px;background-image:url('cover.jpg');background-size:cover;background-position:center;filter:blur(60px) brightness(0.25) saturate(0.4);transform:scale(1.1);z-index:0;}
.bg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.52);z-index:1;}

/* Page */
.page{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 40px;}

/* Back */
.back-link{position:fixed;top:20px;left:20px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.40);z-index:10;transition:color 180ms ease;}
.back-link:hover{color:rgba(255,255,255,0.80);}
.back-link svg{width:14px;height:14px;}

/* Card */
.card{width:100%;max-width:400px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.20);border-radius:24px;backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);box-shadow:0 20px 60px rgba(0,0,0,0.40);overflow:hidden;animation:rise 0.6s ease both;}

/* Cover */
.cover-wrap{width:100%;aspect-ratio:1/1;overflow:hidden;position:relative;}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.cover-wrap .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:800;color:rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);}
.cover-fade{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,rgba(13,13,13,0.9));}

/* Card body */
.card-body{padding:20px 22px 26px;display:flex;flex-direction:column;gap:16px;}

/* Title */
.title-block{text-align:center;}
.artist-label{font-size:11px;font-weight:600;letter-spacing:0.30em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:6px;}
.song-title{font-size:26px;font-weight:700;letter-spacing:0.02em;color:#fff;line-height:1.1;margin-bottom:6px;}
.mix-tag{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.28);}

/* Player tabs */
.player-section{display:flex;flex-direction:column;gap:8px;}
.player-tabs{display:flex;gap:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);border-radius:12px;padding:3px;}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 10px;font-family:inherit;font-size:11px;font-weight:600;letter-spacing:0.06em;color:rgba(255,255,255,0.45);background:transparent;border:none;border-radius:9px;cursor:pointer;transition:background 180ms ease,color 180ms ease;}
.tab-btn svg{width:13px;height:13px;flex-shrink:0;}
.tab-btn.active{background:rgba(255,255,255,0.12);color:#fff;}
.player-frame{border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);}
.player-frame iframe{display:block;width:100%;border:none;}
.player-pane{display:none;}
.player-pane.active{display:block;}

/* Divider */
.divider{height:1px;background:rgba(255,255,255,0.08);}

/* Section label */
.section-label{font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.22);}

/* Service buttons */
.services{display:flex;flex-direction:column;gap:8px;}
.svc-btn{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 13px;transition:background 180ms ease,transform 140ms ease,border-color 180ms ease,box-shadow 180ms ease;}
.svc-btn:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.22);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.30);}
.svc-btn:active{transform:scale(0.98);}
.svc-icon{width:30px;height:30px;border-radius:7px;overflow:hidden;flex-shrink:0;}
.svc-icon svg{width:30px;height:30px;display:block;}
.svc-name{flex:1;font-size:13px;font-weight:600;color:rgba(255,255,255,0.88);}
.svc-action{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.38);}
.svc-arrow{width:14px;height:14px;color:rgba(255,255,255,0.22);flex-shrink:0;transition:color 180ms ease,transform 180ms ease;}
.svc-btn:hover .svc-arrow{color:rgba(255,255,255,0.55);transform:translateX(2px);}

/* Footer */
.footer{margin-top:20px;font-size:10px;color:rgba(255,255,255,0.18);letter-spacing:0.12em;text-transform:uppercase;text-align:center;}

@keyframes rise{from{opacity:0;transform:translateY(28px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@media(max-width:420px){.card{border-radius:20px;}.song-title{font-size:22px;}}
</style>

<script>
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const section = btn.closest('.player-section');
    section.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); });
    section.querySelectorAll('.player-pane').forEach(p => { p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById(btn.dataset.target).classList.add('active');
  });
});
